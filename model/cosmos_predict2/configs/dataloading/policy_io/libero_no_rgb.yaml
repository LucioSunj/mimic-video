img_resize_sizes: [480, 640]

policy_io:
  action:
    eef_pos_ref_delta_lowdim:
      horizon: 60
      normalization_type: ${NormalizationType:VARIANCE}
      target_repr: ${LieRepr:ABSOLUTE}
      target_frequency: 20
      shift_right_by: 0
    eef_rot_ref_delta_lowdim:
      horizon: 60
      normalization_type: ${NormalizationType:IDENTITY}
      target_repr: ${LieRepr:ABSOLUTE}
      target_frequency: 20
      shift_right_by: 0
    gripper_action_lowdim:
      horizon: 60
      normalization_type: ${NormalizationType:VARIANCE}
      target_repr: ${LieRepr:ABSOLUTE}
      target_frequency: 20
      shift_right_by: 0
  obs:
    eef_pos_lowdim:
      horizon: 1
      normalization_type: ${NormalizationType:VARIANCE}
      target_repr: ${LieRepr:ABSOLUTE}
      target_frequency: 20
      shift_right_by: 0
    eef_rot_lowdim:
      horizon: 1
      normalization_type: ${NormalizationType:IDENTITY}
      target_repr: ${LieRepr:ABSOLUTE}
      target_frequency: 20
      shift_right_by: 0
    gripper_lowdim:
      horizon: 1
      normalization_type: ${NormalizationType:VARIANCE}
      target_repr: ${LieRepr:ABSOLUTE}
      target_frequency: 20
      shift_right_by: 0
    language_embedding:
      horizon: 1
      normalization_type: ${NormalizationType:NONE}
      target_repr: null
      target_frequency: null
      shift_right_by: 0


concat_groups:
  action/lowdim_concat:
    - action/eef_pos_ref_delta_lowdim
    - action/eef_rot_ref_delta_lowdim
    - action/gripper_action_lowdim

  obs/lowdim_concat:
    - obs/eef_pos_lowdim
    - obs/eef_rot_lowdim
    - obs/gripper_lowdim
